project:
  title: "サンプル（単一 content.md 方式）"
  subtitle: "本文を 1 ファイルで管理する最小例"
  authors:
    - name: "山田太郎"
      affiliation: "サンプル大学"
  poster_size: "A0"
  orientation: "portrait"
  # 単一ファイル方式: 本文は content.md に '# 見出し {#id}' セクションで持つ
  content_file: content.md

layout:
  template: "two-column-research"
  margin_mm: 18
  gap_mm: 8
  columns:
    count: 2
    width_mode: "ratio"
    ratio: [0.5, 0.5]
    sync_mode: "independent"

theme:
  name: "default"

blocks:
  - { id: background, type: text, title: 背景, source: content.md#background, column: left, order: 1, height: { mode: auto } }
  - { id: method, type: text, title: 方法, source: content.md#method, column: left, order: 2, height: { mode: flex, weight: 1 } }
  - { id: results, type: text, title: 結果, source: content.md#results, column: right, order: 1, height: { mode: flex, weight: 1 } }
  - { id: discussion, type: text, title: 考察, source: content.md#discussion, column: wide, order: 90, height: { mode: auto } }
  - { id: references, type: text, title: 引用文献, source: content.md#references, column: wide, order: 100, height: { mode: auto } }

export:
  pdf: { enabled: true, filename: exports/poster.pdf }
