  <line x1="120" y1="60" x2="120" y2="440" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="440" x2="760" y2="440" stroke="#333" stroke-width="2"/>
  <!-- y ticks -->
  <g fill="#333" font-size="20" text-anchor="end">
